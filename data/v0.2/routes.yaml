# Curated routing table for the v0.2 dataset — the LATENCY shortcut.
#
# Read at QUERY time by the agent (apps/agent/retrieval/tools.py :: route_lookup), per dataset version:
# data/<version>/routes.yaml (committed; env MNA_AGENT_ROUTES overrides with an explicit
# file). When a sub-question's hint_terms hit a key here, the agent uses the
# listed page(s) directly and SKIPS the router LLM call (and a curated-correct page avoids a
# gap→retry round) — that's the search-time saving. A miss falls back to the LLM router, so
# this table is purely additive: only add a term when you're confident which page(s) answer it.
#
# Format:  <hint term>: [<exact page name>, ...]   (a bare string is fine for one page)
# Keys are matched by EXACT normalized term (whitespace-insensitive, case-folded) against a
# sub-question's hint_terms — not substring — so only add terms unique to one page (a confident
# but wrong route can answer from the wrong deck without retrying). Page names must match the
# index EXACTLY (the [[wikilink]] text). Targets not present in the index are silently dropped.
# Only the FIRST routing attempt uses this table; retries diverge via the LLM router.
# Delete this file to fall back to pure-LLM routing.

