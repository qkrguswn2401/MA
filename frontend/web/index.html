<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Stella — 센트로이드 밸류에이션 Q&A</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1e222b;
      --border: #2a2f3a;
      --text: #e6e9ef;
      --muted: #9aa3b2;
      --accent: #5b8cff;
      --accent-soft: #1d2740;
      --user: #243042;
      --ok: #3ecf8e;
      --warn: #e0b341;
      --err: #ff6b6b;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--panel);
    }
    header .logo {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #9b5bff);
      display: grid; place-items: center; font-weight: 700; font-size: 15px;
    }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header .sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    header .status { margin-left: auto; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .dot.ok { background: var(--ok); } .dot.err { background: var(--err); }

    main {
      flex: 1; overflow-y: auto;
      padding: 24px 0 8px;
      display: flex; flex-direction: column; align-items: center;
    }
    .feed { width: 100%; max-width: 820px; padding: 0 18px; }

    .msg { margin-bottom: 22px; display: flex; flex-direction: column; }
    .msg .role { font-size: 11px; color: var(--muted); margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
    .bubble {
      padding: 13px 16px; border-radius: 12px; line-height: 1.6; font-size: 14.5px;
      border: 1px solid var(--border); white-space: pre-wrap; word-break: break-word;
    }
    .msg.user { align-items: flex-end; }
    .msg.user .bubble { background: var(--user); border-color: #31405a; max-width: 80%; }
    .msg.bot .bubble { background: var(--panel); }
    .bubble code { font-family: var(--mono); background: var(--panel-2); padding: 1px 5px; border-radius: 4px; font-size: 13px; color: #cdd6ff; }

    /* routing trace */
    .trace { margin-top: 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel-2); overflow: hidden; }
    .trace > summary {
      cursor: pointer; padding: 9px 14px; font-size: 12.5px; color: var(--muted);
      list-style: none; display: flex; align-items: center; gap: 8px; user-select: none;
    }
    .trace > summary::-webkit-details-marker { display: none; }
    .trace > summary::before { content: "▸"; transition: transform .15s; }
    .trace[open] > summary::before { transform: rotate(90deg); }
    .trace .steps { padding: 4px 14px 12px; }
    .step { display: flex; gap: 10px; padding: 7px 0; border-top: 1px solid var(--border); font-size: 12.5px; }
    .step:first-child { border-top: none; }
    .step .n { color: var(--muted); min-width: 18px; font-family: var(--mono); }
    .step .act {
      font-family: var(--mono); font-size: 11px; padding: 1px 7px; border-radius: 5px; height: fit-content;
      background: var(--accent-soft); color: var(--accent); white-space: nowrap;
    }
    .step .act.read { background: #1d3a2c; color: var(--ok); }
    .step .act.answer { background: #3a341d; color: var(--warn); }
    .step .agent {
      font-family: var(--mono); font-size: 11px; padding: 1px 7px; border-radius: 5px; height: fit-content;
      background: var(--accent-soft); color: var(--muted); white-space: nowrap;
    }
    .step .agent.planner { background: #2a2440; color: #b9a6ff; }
    .step .agent.router { background: #1e3340; color: #8fd0ff; }
    .step .agent.retriever { background: #1d3a2c; color: var(--ok); }
    .step .agent.verifier { background: #402a2a; color: #ff9f9f; }
    .step .agent.synthesizer { background: #3a341d; color: var(--warn); }
    .step .body { flex: 1; min-width: 0; }
    .step .arg { font-family: var(--mono); color: #cdd6ff; word-break: break-all; }
    .step .thought { color: var(--muted); margin-top: 2px; }

    .thinking { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; padding: 4px 0; }
    .thinking .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }

    .empty { text-align: center; color: var(--muted); margin-top: 8vh; }
    .empty h2 { font-weight: 600; font-size: 18px; color: var(--text); }
    .chips { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; margin-top: 18px; }
    .chip {
      border: 1px solid var(--border); background: var(--panel); color: var(--text);
      padding: 8px 13px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: .12s;
    }
    .chip:hover { border-color: var(--accent); background: var(--accent-soft); }

    footer { border-top: 1px solid var(--border); background: var(--panel); padding: 14px 0 18px; display: flex; justify-content: center; }
    .composer { width: 100%; max-width: 820px; padding: 0 18px; display: flex; gap: 10px; }
    .composer textarea {
      flex: 1; resize: none; background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px;
      font-size: 14.5px; font-family: inherit; line-height: 1.5; max-height: 160px; outline: none;
    }
    .composer textarea:focus { border-color: var(--accent); }
    .composer button {
      background: var(--accent); color: #fff; border: none; border-radius: 12px;
      padding: 0 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .12s;
    }
    .composer button:disabled { background: #2a2f3a; color: var(--muted); cursor: not-allowed; }
    .hint { max-width: 820px; width: 100%; padding: 6px 20px 0; font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="logo">S</div>
    <div>
      <h1>Project Stella</h1>
      <div class="sub">센트로이드 인베스트먼트 M&amp;A 밸류에이션 · 벡터리스 위키 에이전트</div>
    </div>
    <div class="status" id="status"><span class="dot" id="dot"></span><span id="statusText">연결 확인 중…</span></div>
  </header>

  <main id="main">
    <div class="feed" id="feed">
      <div class="empty" id="empty">
        <h2>무엇이든 물어보세요</h2>
        <div>DCF, AUM, 관리수수료, 기업가치 등 — 답변은 셀 출처(<code>Sheet!Cell</code>)와 함께 제공됩니다.</div>
        <div class="chips" id="chips"></div>
      </div>
    </div>
  </main>

  <footer>
    <div style="width:100%;max-width:820px;">
      <div class="hint">Enter 전송 · Shift+Enter 줄바꿈 · 추론 과정은 답변 아래에서 펼쳐볼 수 있습니다.</div>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="예: 기업가치는 얼마인가요?"></textarea>
        <button id="send">전송</button>
      </div>
    </div>
  </footer>

  <script>
    const feed = document.getElementById("feed");
    const empty = document.getElementById("empty");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const dot = document.getElementById("dot");
    const statusText = document.getElementById("statusText");

    const SAMPLES = [
      "기업가치는 얼마인가요?",
      "관리수수료의 주요 동인은 무엇인가요?",
      "AUM은 어떻게 추정되었나요?",
      "DCF에서 적용한 할인율(WACC)은?",
    ];
    const chips = document.getElementById("chips");
    SAMPLES.forEach(q => {
      const c = document.createElement("div");
      c.className = "chip"; c.textContent = q;
      c.onclick = () => { input.value = q; submit(); };
      chips.appendChild(c);
    });

    // light inline rendering: escape, then highlight Sheet!Cell refs as <code>
    function render(text) {
      const esc = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      return esc.replace(/([A-Za-z0-9 가-힣()_#.&,\-]+![A-Z]{1,3}\d{1,4})/g, "<code>$1</code>");
    }

    function addMsg(role, text) {
      empty.style.display = "none";
      const wrap = document.createElement("div");
      wrap.className = "msg " + role;
      const r = document.createElement("div");
      r.className = "role";
      r.textContent = role === "user" ? "나" : "Stella";
      const b = document.createElement("div");
      b.className = "bubble";
      if (role === "bot") b.innerHTML = render(text); else b.textContent = text;
      wrap.appendChild(r); wrap.appendChild(b);
      feed.appendChild(wrap);
      scroll();
      return { wrap, bubble: b };
    }

    function scroll() { document.getElementById("main").scrollTop = 1e9; }

    function autosize() { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 160) + "px"; }
    input.addEventListener("input", autosize);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
    });
    send.addEventListener("click", submit);

    let busy = false;

    function submit() {
      const q = input.value.trim();
      if (!q || busy) return;
      input.value = ""; autosize();
      addMsg("user", q);
      ask(q);
    }

    function ask(question) {
      busy = true; send.disabled = true;

      // bot container: a live "thinking" line, a trace panel, then the answer
      const bot = addMsg("bot", "");
      bot.bubble.style.display = "none"; // hidden until the answer arrives

      const think = document.createElement("div");
      think.className = "thinking";
      think.innerHTML = '<span class="pulse"></span><span>위키를 탐색하는 중…</span>';
      bot.wrap.appendChild(think);

      const trace = document.createElement("details");
      trace.className = "trace"; trace.open = true;
      trace.innerHTML = '<summary>추론 과정</summary><div class="steps"></div>';
      const steps = trace.querySelector(".steps");
      bot.wrap.appendChild(trace);

      const url = "/ask/stream?question=" + encodeURIComponent(question) + "&max_steps=8";
      const es = new EventSource(url);

      es.addEventListener("step", e => {
        const d = JSON.parse(e.data);
        const row = document.createElement("div");
        row.className = "step";
        const act = (d.action || "").toLowerCase();
        const agent = (d.agent || "").toLowerCase();
        row.innerHTML =
          '<span class="n">' + (d.step ?? "") + '</span>' +
          (d.agent ? '<span class="agent ' + agent + '">' + d.agent + '</span>' : '') +
          '<span class="act ' + act + '">' + (d.action || "?") + '</span>' +
          '<div class="body">' +
            (d.arg ? '<div class="arg">' + escapeHtml(d.arg) + '</div>' : '') +
            (d.thought ? '<div class="thought">' + escapeHtml(d.thought) + '</div>' : '') +
          '</div>';
        steps.appendChild(row);
        scroll();
      });

      let answerText = ""; // accumulates streamed token fragments
      es.addEventListener("token", e => {
        const d = JSON.parse(e.data);
        answerText += d.text || "";
        think.remove();
        trace.open = false; // collapse once the answer starts streaming
        bot.bubble.style.display = "";
        bot.bubble.innerHTML = render(answerText); // re-render the growing answer
        scroll();
      });

      es.addEventListener("answer", e => {
        const d = JSON.parse(e.data);
        think.remove();
        trace.open = false; // collapse once answered; user can re-expand
        bot.bubble.style.display = "";
        bot.bubble.innerHTML = render(d.answer || answerText || "(답변 없음)");
        scroll();
      });

      es.addEventListener("done", () => { es.close(); finish(); });
      es.addEventListener("error", e => {
        es.close();
        think.remove();
        let detail = "스트림 오류가 발생했습니다.";
        try { if (e.data) detail = JSON.parse(e.data).detail || detail; } catch (_) {}
        if (bot.bubble.style.display === "none") {
          bot.bubble.style.display = "";
          bot.bubble.innerHTML = '<span style="color:var(--err)">⚠ ' + escapeHtml(detail) + '</span>';
        }
        finish();
      });
    }

    function finish() { busy = false; send.disabled = false; input.focus(); }
    function escapeHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    // health badge
    async function poll() {
      try {
        const r = await fetch("/health"); const h = await r.json();
        const ok = h.status === "ok";
        dot.className = "dot " + (ok ? "ok" : "err");
        statusText.textContent = ok
          ? (h.wiki_pages + " 페이지 · " + (h.llm?.model || "LLM"))
          : "LLM 연결 끊김";
      } catch (_) {
        dot.className = "dot err"; statusText.textContent = "서버 연결 끊김";
      }
    }
    poll(); setInterval(poll, 15000);
    input.focus();
  </script>
</body>
</html>
